name: Daily Auto Commit

on:
  schedule:
    # Runs daily at midnight IST (08:30 PM UTC / 2:00 AM IST)
    - cron: '30 20 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make commits
        run: |
          git config --global user.email "iamramm8@gmail.com"
          git config --global user.name "Sriram Gandhi S"
          
          FILES=("TODO.md" "BUGS.md" "testing-notes.txt" "future-updates.md" "dev-notes.md")
          
          # Randomize cycle count between 8 and 11 (16 to 22 commits)
          MIN_CYCLES=8
          MAX_CYCLES=11
          CYCLES=$((MIN_CYCLES + RANDOM % (MAX_CYCLES - MIN_CYCLES + 1)))
          echo "Selected random cycle count: $CYCLES"
          
          for i in $(seq 1 $CYCLES)
          do
            # Pick a random developer note file to modify
            SELECTED_FILE=${FILES[$RANDOM % ${#FILES[@]}]}
            echo "Starting cycle $i on file: $SELECTED_FILE"
            
            # Define project-specific natural commit messages based on file type
            case "$SELECTED_FILE" in
              "TODO.md")
                ADD_MSGS=(
                  "docs: update Spring Boot controller route integration tasks"
                  "docs: add MongoDB index optimization tasks to todo"
                  "docs: add Python model inference backend integration list"
                )
                DEL_MSGS=(
                  "docs: clean up completed Spring Boot backend todo items"
                  "docs: organize authentication setup checklist tasks"
                  "docs: formatting updates to project todo tracker"
                )
                ;;
              "BUGS.md")
                ADD_MSGS=(
                  "docs: track CORS policy exception in local dev environment"
                  "docs: document file upload size limit exception in bugs log"
                  "docs: note Python script memory leakage behavior"
                )
                DEL_MSGS=(
                  "docs: remove resolved CORS configuration bugs from list"
                  "docs: clean up MongoDB query optimization bug notes"
                  "docs: formatting adjustments in bug log"
                )
                ;;
              "future-updates.md")
                ADD_MSGS=(
                  "docs: plan Celery task queue integration for authenticity scoring"
                  "docs: add file chunking upload mechanism draft to updates"
                  "docs: outline hybrid consensus algorithm roadmap"
                )
                DEL_MSGS=(
                  "docs: clean up future updates roadmap formatting"
                  "docs: format authenticity scoring pipeline plans"
                  "docs: normalize future updates document structure"
                )
                ;;
              "testing-notes.txt")
                ADD_MSGS=(
                  "test: log JUnit test results for API controller endpoints"
                  "test: write python authenticity model validation metrics"
                  "test: document MongoDB connection pool load test results"
                )
                DEL_MSGS=(
                  "test: prune old Spring Boot mock test logs"
                  "test: clean up authenticity testing notes"
                  "test: normalize testing notes format"
                )
                ;;
              "dev-notes.md")
                ADD_MSGS=(
                  "docs: update Java JDK 21 transition checklist"
                  "docs: write spring application properties configuration tips"
                  "docs: document Python virtual environment path setups"
                )
                DEL_MSGS=(
                  "docs: clean up application properties guidance"
                  "docs: remove deprecated environment variables documentation"
                  "docs: normalize dev notes file"
                )
                ;;
            esac
            
            # Step 1: ADD
            echo " " >> $SELECTED_FILE
            msg_add=${ADD_MSGS[$RANDOM % ${#ADD_MSGS[@]}]}
            git add $SELECTED_FILE
            git commit -m "$msg_add"
            git push origin HEAD:${{ github.ref_name }}
            
            sleep $((3 + RANDOM % 4))
            
            # Step 2: DEL
            sed -i '$d' $SELECTED_FILE
            msg_del=${DEL_MSGS[$RANDOM % ${#DEL_MSGS[@]}]}
            git add $SELECTED_FILE
            git commit -m "$msg_del"
            git push origin HEAD:${{ github.ref_name }}
            
            sleep $((5 + RANDOM % 6))
          done
