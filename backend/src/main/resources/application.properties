spring.application.name=ai-media-auth
server.port=8080

# Database Configuration (MySQL)
# Update these with your local MySQL credentials
spring.datasource.url=jdbc:mysql://localhost:3306/aimedia_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# Use a strong base64 encoded secret key in production
jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
jwt.expiration=86400000

# File Upload Configuration
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# External AI Service
ai.service.url=http://localhost:8000
